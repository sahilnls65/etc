<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#2563eb"/>
  <circle cx="32" cy="32" r="27" fill="#fff"/>

  <!-- Clock face -->
  <!-- Hour markers -->
  <circle cx="32" cy="8" r="2" fill="#1e293b"/>
  <circle cx="56" cy="32" r="2" fill="#1e293b"/>
  <circle cx="32" cy="56" r="2" fill="#1e293b"/>
  <circle cx="8" cy="32" r="2" fill="#1e293b"/>

  <!-- Small markers -->
  <circle cx="44" cy="11.1" r="1.2" fill="#cbd5e1"/>
  <circle cx="52.9" cy="20" r="1.2" fill="#cbd5e1"/>
  <circle cx="52.9" cy="44" r="1.2" fill="#cbd5e1"/>
  <circle cx="44" cy="52.9" r="1.2" fill="#cbd5e1"/>
  <circle cx="20" cy="52.9" r="1.2" fill="#cbd5e1"/>
  <circle cx="11.1" cy="44" r="1.2" fill="#cbd5e1"/>
  <circle cx="11.1" cy="20" r="1.2" fill="#cbd5e1"/>
  <circle cx="20" cy="11.1" r="1.2" fill="#cbd5e1"/>

  <!-- Hour hand (pointing to ~5) -->
  <line x1="32" y1="32" x2="40" y2="45" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Minute hand (pointing to ~12) -->
  <line x1="32" y1="32" x2="32" y2="12" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#2563eb"/>
